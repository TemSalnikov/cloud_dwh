{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: platform-postgresql
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgresql.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgresql.auth.database | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: platform-postgresql-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.postgresql.persistence.size }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: platform-postgresql
  labels:
    app: platform-postgresql
spec:
  serviceName: platform-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: platform-postgresql
  template:
    metadata:
      labels:
        app: platform-postgresql
    spec:
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - containerPort: 5432
              name: postgresql
          envFrom:
            - secretRef:
                name: platform-postgresql
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgresql.auth.username }}"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: platform-postgresql-data
---
apiVersion: v1
kind: Service
metadata:
  name: platform-postgresql
spec:
  selector:
    app: platform-postgresql
  ports:
    - port: 5432
      targetPort: 5432
{{- end }}
