{{- if .Values.platformApi.enabled | default true }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  labels:
    app: platform-api
spec:
  replicas: {{ .Values.platformApi.replicaCount }}
  selector:
    matchLabels:
      app: platform-api
  template:
    metadata:
      labels:
        app: platform-api
    spec:
      serviceAccountName: platform-api
      containers:
        - name: api
          image: "{{ .Values.platformApi.image.repository }}:{{ .Values.platformApi.image.tag }}"
          imagePullPolicy: {{ .Values.platformApi.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: {{ .Values.platformApi.env.DATABASE_URL | quote }}
            - name: REDIS_URL
              value: {{ .Values.platformApi.env.REDIS_URL | quote }}
            - name: KUBECONFIG_IN_CLUSTER
              value: {{ .Values.platformApi.env.KUBECONFIG_IN_CLUSTER | quote }}
            {{- if .Values.platformApi.env.INGRESS_BASE_DOMAIN }}
            - name: INGRESS_BASE_DOMAIN
              value: {{ .Values.platformApi.env.INGRESS_BASE_DOMAIN | quote }}
            {{- end }}
            {{- if .Values.platformApi.env.SERVER_IP }}
            - name: SERVER_IP
              value: {{ .Values.platformApi.env.SERVER_IP | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.platformApi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api
spec:
  selector:
    app: platform-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-api
rules:
  - apiGroups: [""]
    resources: ["namespaces", "secrets", "configmaps", "pods", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["clickhouse.altinity.com"]
    resources: ["clickhouseinstallations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platform-api
subjects:
  - kind: ServiceAccount
    name: platform-api
    namespace: {{ .Release.Namespace }}
{{- end }}
