{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-redis
  labels:
    app: platform-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-redis
  template:
    metadata:
      labels:
        app: platform-redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          ports:
            - containerPort: 6379
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: platform-redis
spec:
  selector:
    app: platform-redis
  ports:
    - port: 6379
      targetPort: 6379
{{- end }}
